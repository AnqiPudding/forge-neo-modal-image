name: Publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKERHUB_NAMESPACE: anqipudding
  DOCKERHUB_REPOSITORY: forge-neo-modal-image

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize Docker Hub image name
        shell: bash
        run: |
          namespace="${DOCKERHUB_NAMESPACE,,}"
          repository="${DOCKERHUB_REPOSITORY,,}"
          echo "DOCKERHUB_NAMESPACE=${namespace}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_REPOSITORY=${repository}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=docker.io/${namespace}/${repository}" >> "$GITHUB_ENV"

      - name: Free runner disk
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create Docker Hub repository
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          token="$(
            curl -fsS https://hub.docker.com/v2/auth/token \
              -H 'Content-Type: application/json' \
              -d "{\"identifier\":\"${DOCKERHUB_USERNAME}\",\"secret\":\"${DOCKERHUB_TOKEN}\"}" \
            | jq -r '.access_token'
          )"

          if [ -z "${token}" ] || [ "${token}" = "null" ]; then
            echo "Docker Hub auth did not return an access token."
            exit 1
          fi

          repo_url="https://hub.docker.com/v2/namespaces/${DOCKERHUB_NAMESPACE}/repositories/${DOCKERHUB_REPOSITORY}"
          status="$(curl -sS -o /tmp/dockerhub-repo.json -w "%{http_code}" -H "Authorization: Bearer ${token}" "${repo_url}")"

          if [ "${status}" = "200" ]; then
            echo "Docker Hub repository already exists: ${IMAGE_NAME}"
            exit 0
          fi

          if [ "${status}" != "404" ]; then
            echo "Could not check Docker Hub repository. HTTP ${status}:"
            cat /tmp/dockerhub-repo.json
            exit 1
          fi

          payload="$(
            jq -n \
              --arg name "${DOCKERHUB_REPOSITORY}" \
              --arg namespace "${DOCKERHUB_NAMESPACE}" \
              --arg description "Forge-Neo Modal image" \
              --arg full_description "Forge-Neo Modal image with Python 3.13, SageAttention, and baked extensions." \
              '{name:$name, namespace:$namespace, registry:"docker.io", description:$description, full_description:$full_description, is_private:false}'
          )"

          create_status="$(
            curl -sS -o /tmp/dockerhub-create.json -w "%{http_code}" \
              -X POST "https://hub.docker.com/v2/namespaces/${DOCKERHUB_NAMESPACE}/repositories" \
              -H "Authorization: Bearer ${token}" \
              -H "Content-Type: application/json" \
              -d "${payload}"
          )"

          if [ "${create_status}" != "201" ]; then
            echo "Could not create Docker Hub repository. HTTP ${create_status}:"
            cat /tmp/dockerhub-create.json
            exit 1
          fi

          echo "Created Docker Hub repository: ${IMAGE_NAME}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build OCI image archive
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          outputs: type=oci,dest=/tmp/forge-neo-modal-image.oci.tar
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install regctl
        shell: bash
        run: |
          curl -fsSL https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64 -o regctl
          sudo install -m 755 regctl /usr/local/bin/regctl
          regctl version

      - name: Push image archive to Docker Hub
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          regctl registry login docker.io -u "${DOCKERHUB_USERNAME}" -p "${DOCKERHUB_TOKEN}"
          regctl registry set --blob-chunk 20971520 --blob-max 104857600 docker.io

          while IFS= read -r tag; do
            if [ -n "${tag}" ]; then
              echo "Importing ${tag}"
              regctl image import "${tag}" /tmp/forge-neo-modal-image.oci.tar -v info
            fi
          done <<< "${TAGS}"
